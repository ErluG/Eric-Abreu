<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Eric Abreu</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        /* Estilos básicos para que funcione de inmediato */
        body { font-family: sans-serif; background: #111; color: white; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .navbar { background: #000; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .nav-links { list-style: none; display: flex; gap: 15px; }
        .nav-links a { color: #00ffcc; text-decoration: none; font-weight: bold; }
        
        /* Estilos del Carrusel */
        .swiper { width: 100%; height: 450px; margin-top: 20px; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; }
        .swiper-slide img, .swiper-slide video { width: 100%; height: 100%; object-fit: cover; }
        
        h1, h2 { text-align: center; padding: 10px; }
        h2 { font-size: 1.2rem; color: #ccc; font-weight: normal; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">DJ Eric Abreu</div>
        <ul class="nav-links">
            <li><a href="https://www.instagram.com/ericzabreu.dj">Instagram</a></li>
            <li><a href="mailto:erzoabreu@gmail.com">Correo</a></li> 
            <li><a href="https://wa.me/59893879286">WhatsApp</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Eric Abreu</h1>
        <h2>Donde cada set es una experiencia: clásicos de los 80, disco, house y remixes.</h2>

        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="https://via.placeholder.com/800x450/333/fff?text=Tu+Foto+1" alt="DJ Set">
                </div>
                <div class="swiper-slide">
                    <video autoplay muted loop playsinline>
                        <source src="tu-video.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="swiper-slide">
                    <img src="https://via.placeholder.com/800x450/222/fff?text=Tu+Foto+2" alt="Disco House">
                </div>
            </div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            loop: true,
            pagination: { el: ".swiper-pagination", clickable: true },
            navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
        });
    </script>
</body>
</html>
