<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Eric Abreu</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <div class="logo"><h1>DJ Eric Abreu</h1></div>
            <ul class="nav-links">
                <li><a href="https://www.instagram.com/ericzabreu.dj">Instagram</a></li>
                <li><a href="mailto:erzoabreu@gmail.com">Correo</a></li> 
                <li><a href="https://wa.me/59893879286">Teléfono</a></li>
            </ul>
        </div>
    </nav>

    <header>
        <h2>Donde cada set es una experiencia, un viaje donde los clásicos de los 80, el disco, el house y los remixes se mezclan para despertar emociones.</h2>
    </header>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="tu-foto1.jpg" alt="DJ Set 80s">
            </div>
            <div class="swiper-slide">
                <video autoplay muted loop playsinline>
                    <source src="tu-video.mp4" type="video/mp4">
                    Tu navegador no soporta videos.
                </video>
            </div>
            <div class="swiper-slide">
                <img src="tu-foto2.jpg" alt="Disco House Night">
            </div>
        </div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper(".mySwiper", {
            loop: true,
            pagination: { el: ".swiper-pagination", clickable: true },
            navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
        });
    </script>
</body>
</html>
